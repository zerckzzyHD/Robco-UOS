name: Release

on:
  # Release only after CI passes on main — never tag a broken build.
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types: [completed]

# Run-wide grants: contents (create the tag + GitHub Release) plus pages +
# id-token, which the reusable deploy.yml job below needs to publish to Pages.
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  check-and-release:
    name: Auto-Release on Version Change
    runs-on: ubuntu-latest
    # Only release when CI passed on main.
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    # 'released' is the production deploy gate (Protocol 43): true ONLY when a new
    # version tag was just created (an APP_VERSION bump). An ordinary push to main
    # with no version change → exists == 'true' → released == 'false' → no deploy.
    outputs:
      released: ${{ steps.check.outputs.exists == 'false' && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract version from state.js
        id: version
        run: |
          VERSION=$(grep -oP "const APP_VERSION\s*=\s*'\K[^']+" js/core/state.js)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if release already exists
        id: check
        run: |
          if git tag -l "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.version.outputs.tag }} already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "New version detected — creating release."
          fi

      - name: Extract changelog entry
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          # Extract the latest version block from CHANGELOG.md
          ENTRY=$(sed -n "/^## \[v${{ steps.version.outputs.version }}\]/,/^## \[v[0-9]/p" CHANGELOG.md | sed '$d')
          if [ -z "$ENTRY" ]; then
            ENTRY="Release ${{ steps.version.outputs.tag }}"
          fi
          # Write to file to handle multi-line content
          echo "$ENTRY" > /tmp/release_notes.txt

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: RobCo U.O.S. ${{ steps.version.outputs.tag }}
          body_path: /tmp/release_notes.txt
          generate_release_notes: false

  # ── Production deploy — the ONLY automated path to prod (Protocol 43) ──
  # Runs ONLY when check-and-release just created a NEW version release. Because
  # deploy.yml is workflow_call-only, it can never fire on an ordinary push to
  # main; this gated invocation is what makes production release-only. (Defense
  # in depth with deploy.yml's own main-only guard + branch protection.)
  deploy-production:
    name: Deploy released version to production
    needs: check-and-release
    if: needs.check-and-release.outputs.released == 'true'
    uses: ./.github/workflows/deploy.yml
