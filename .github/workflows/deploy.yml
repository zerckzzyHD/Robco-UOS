name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage app files
        # Copy only the files that belong on the public site.
        # Private files (CLAUDE.md, RULES.md, ARCHITECTURE.md, tests/, scripts/,
        # .github/, node_modules, package files) are intentionally excluded.
        run: |
          mkdir -p _site
          cp index.html sw.js manifest.json icon.png _site/
          cp -r css js docs _site/
          cp CHANGELOG.md _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
