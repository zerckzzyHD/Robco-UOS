name: Deploy to GitHub Pages

on:
  # Production is RELEASE-GATED (Protocol 43): this workflow is invoked ONLY by
  # release.yml, and only when a version release (APP_VERSION bump) is detected.
  # It is NOT triggered by ordinary pushes to main, so unreleased work on main
  # (or dev) can never reach production automatically — only a deliberate version
  # bump publishes.
  workflow_call:

  # Manual override for emergency redeploy / rollback from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # Defense in depth (composes with release.yml's release-only gate + branch
    # protection): when invoked by release.yml the inherited CI run must have
    # succeeded on main; a manual dispatch is always allowed.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Deploy the exact commit CI tested; fall back to HEAD for manual dispatch.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Stage app files
        # Copy only the files that belong on the public site.
        # Private files (CLAUDE.md, RULES.md, ARCHITECTURE.md, tests/, scripts/,
        # .github/, node_modules, package files) are intentionally excluded.
        # *.png covers icon.png + all shortcut icons (comm-link, inventory, stats, new-campaign).
        run: |
          mkdir -p _site
          cp *.png index.html sw.js manifest.json _site/
          cp -r css js docs _site/
          cp CHANGELOG.md _site/

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
