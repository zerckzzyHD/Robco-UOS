name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Persistence Audit (376 tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint (errors only — warnings are cross-file globals)
        run: npx eslint . --max-warnings 100

      - name: Prettier check
        run: npx prettier --check .

      - name: Persistence audit — Node runner (376 tests)
        run: node tests/check-persistence.js

      - name: Persistence audit — PowerShell runner (376 tests)
        shell: bash
        run: pwsh -File tests/check-persistence.ps1

      - name: Runner parity check — both totals must match
        shell: bash
        run: |
          NODE_TOTAL=$(node tests/check-persistence.js 2>/dev/null \
            | sed 's/\x1b\[[0-9;]*m//g' \
            | grep -oE 'ALL [0-9]+ TESTS' | grep -oE '[0-9]+')
          PS_TOTAL=$(pwsh -File tests/check-persistence.ps1 2>/dev/null \
            | grep -oE 'ALL [0-9]+ TESTS' | grep -oE '[0-9]+')
          if [ "$NODE_TOTAL" != "$PS_TOTAL" ]; then
            echo "[FAIL] Runner parity broken: Node=$NODE_TOTAL PS=$PS_TOTAL (Protocol 15)"
            exit 1
          fi
          echo "[PASS] Both runners agree: $NODE_TOTAL tests"

  boot-and-render:
    name: Boot Smoke Test & Render Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Boot smoke test (booted state + zero console errors)
        run: node tests/boot-smoke.mjs

      - name: Render check (360px & 412px — no overflow, no focus zoom)
        run: node tests/render-check.mjs
