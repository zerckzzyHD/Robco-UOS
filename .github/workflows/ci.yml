name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Persistence Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint (errors only — warnings are cross-file globals)
        run: npx eslint . --max-warnings 100

      - name: Prettier check
        run: npx prettier --check .

      - name: Persistence audit (106 tests)
        run: node tests/check-persistence.js
