name: CI

on:
  push:
    branches: [main, dev]
  # Gate PRs into dev (feature branches — not covered by the push trigger above).
  # A dev→main release PR is intentionally NOT re-gated: its head SHA was already
  # gated by the push to dev, and it is gated again by the push trigger on merge to
  # main, so a pull_request run on it is pure duplicate work (audit #10b). Normal
  # push gating for both branches is unchanged.
  pull_request:
    branches: [dev]

permissions:
  contents: read

jobs:
  gate:
    name: Full Gate (lint + format + tests + browser)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run full gate
        run: npm run gate
