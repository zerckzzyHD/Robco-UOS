name: Nightly Tests

# Nightly Node test sweep on dev. COMPLEMENTS the pre-push gate - this workflow
# is TESTS ONLY and never deploys or releases anything (no Pages deploy, no
# GitHub release, no tag). It re-runs the canonical Node persistence runner on a
# schedule so any drift or environment-specific failure surfaces even between
# pushes. (2.8.5 U-B3: the PowerShell mirror was deleted and Protocol 15 retired;
# this workflow used to run both runners and now runs the single Node runner.)
on:
  schedule:
    # 07:15 UTC daily (~00:15 US Pacific). Off-the-hour to avoid GitHub's
    # top-of-hour scheduling congestion. Scheduled runs use the default branch (dev).
    - cron: '15 7 * * *'
  # Manual trigger from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-tests:
    name: Nightly Node test (dev)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v7
        with:
          ref: dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Single source of truth for the Node version (see .nvmrc / ci.yml).
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Node runner (tests/robco-diagnostics.js)
        run: node tests/robco-diagnostics.js
