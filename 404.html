<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ERROR 404 — RobCo U.O.S.</title>
    <style>
      :root {
        --green: #14fdce;
        --green-rgb: 20, 253, 206;
        --bg: #010a07;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--green);
        font-family: 'Courier New', Courier, monospace;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .terminal {
        border: 2px solid var(--green);
        box-shadow:
          0 0 12px rgba(var(--green-rgb), 0.4),
          inset 0 0 30px rgba(var(--green-rgb), 0.03);
        max-width: 600px;
        width: 100%;
        padding: 2rem;
      }
      .header {
        border-bottom: 1px dashed var(--green);
        padding-bottom: 1rem;
        margin-bottom: 1.5rem;
        font-size: 0.75rem;
        opacity: 0.7;
        letter-spacing: 0.05em;
      }
      h1 {
        font-size: clamp(1.4rem, 6vw, 2.2rem);
        text-shadow:
          0 0 8px var(--green),
          0 0 20px var(--green);
        margin-bottom: 0.5rem;
        letter-spacing: 0.1em;
      }
      .code {
        font-size: clamp(3rem, 15vw, 5rem);
        line-height: 1;
        text-shadow:
          0 0 16px var(--green),
          0 0 40px var(--green);
        margin-bottom: 1rem;
      }
      p {
        opacity: 0.85;
        margin-bottom: 1rem;
        line-height: 1.6;
        font-size: 0.9rem;
      }
      .prompt::before {
        content: '> ';
        opacity: 0.5;
      }
      a {
        color: var(--green);
        text-decoration: none;
        border-bottom: 1px solid rgba(var(--green-rgb), 0.4);
        transition: border-color 0.15s;
      }
      a:hover {
        border-color: var(--green);
        text-shadow: 0 0 6px var(--green);
      }
      .blink {
        animation: blink 1.1s step-end infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      .footer {
        margin-top: 1.5rem;
        border-top: 1px dashed rgba(var(--green-rgb), 0.3);
        padding-top: 1rem;
        font-size: 0.75rem;
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div class="terminal">
      <div class="header">
        ROBCO INDUSTRIES (TM) &nbsp;|&nbsp; UNIFIED OPERATING SYSTEM &nbsp;|&nbsp; COPYRIGHT 2075
      </div>
      <div class="code">404</div>
      <h1>FILE NOT FOUND<span class="blink">_</span></h1>
      <p>The resource you requested does not exist on this terminal.</p>
      <p class="prompt">Return to the <a href="./">main terminal</a> to resume your session.</p>
      <div class="footer">
        SECTOR: UNKNOWN &nbsp;|&nbsp; ACCESS LEVEL: DENIED &nbsp;|&nbsp; PLEASE STAND BY
      </div>
    </div>
  </body>
</html>
